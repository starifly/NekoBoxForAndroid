name: CI
on:
  workflow_dispatch:
env:
  MIERU_VERSION: v3.34.1
  MDVPN_REF: android-vpnservice-protect-hook
  MDVPN_COMMIT: d481d72d4b86783a87d536c214d2c68cc4e9320e
  NAIVE_VERSION: v149.0.7827.114-1
  OLCRTC_REPO: https://github.com/hawkff/olcrtc.git
  OLCRTC_COMMIT: ad5cc1e3d60b657b15ccd26f8db91395bf9630d0
permissions:
  contents: read
jobs:
  guard:
    name: Repo Guards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Guard - lint baseline may only shrink
        run: bash ./scripts/check-lint-baseline.sh
      - name: Guard - release publication requires explicit opt-in
        run: bash scripts/check-release-publish-gate.sh --self-test
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs:
      - libcore
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download LibCore
        uses: namespace-actions/download-artifact@5c070f7d7ebdc47682b04aa736c76e46ff5f6e1e # v1
        with:
          name: libcore-aar-ci
          path: app/libs
      - name: Gradle cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gradle
          key: gradle-test-${{ hashFiles('**/*.gradle.kts') }}-ci
      - name: Unit Tests
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          ./gradlew app:testOssDebugUnitTest
  instrumented:
    name: Instrumented (Room migrations)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - libcore
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download LibCore
        uses: namespace-actions/download-artifact@5c070f7d7ebdc47682b04aa736c76e46ff5f6e1e # v1
        with:
          name: libcore-aar-ci
          path: app/libs
      - name: KVM check
        id: kvm
        run: |
          if [ -c /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "kvm=true" >> "$GITHUB_OUTPUT"
          else
            echo "kvm=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KVM is unavailable or inaccessible; emulator test skipped"
          fi
      - name: Run migration test on emulator
        if: steps.kvm.outputs.kvm == 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "sdk.dir=${ANDROID_HOME}" > local.properties
            ./gradlew :app:connectedOssDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=io.nekohasekai.sagernet.database.SagerDatabaseMigrationTest --no-configuration-cache
      - name: Result note
        if: steps.kvm.outputs.kvm == 'false'
        run: echo "Instrumented test skipped because KVM is unavailable; the manual device gate applies."
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs:
      - libcore
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download LibCore
        uses: namespace-actions/download-artifact@5c070f7d7ebdc47682b04aa736c76e46ff5f6e1e # v1
        with:
          name: libcore-aar-ci
          path: app/libs
      - name: Gradle cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gradle
          key: gradle-lint-${{ hashFiles('**/*.gradle.kts') }}-ci
      - name: Lint
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          ./gradlew app:lintOssDebug
      - name: Spotless
        run: ./gradlew spotlessCheck
  libcore:
    name: Native Build (LibCore)
    runs-on: ubuntu-latest
    needs:
      - guard
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Golang Status
        run: find buildScript libcore -type f -name "*.sh" | xargs cat | sha1sum > golang_status
      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status
      - name: LibCore Cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}-ci
      - name: Install Golang
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
      - name: Native Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib core
      - name: Verify 16 KB ELF alignment
        run: bash ./scripts/verify-elf-alignment.sh app/libs/libcore.aar
      - name: Upload LibCore
        uses: namespace-actions/upload-artifact@f6ccaacc655aec41b93af180d1d7eef21af862d2 # v1
        with:
          name: libcore-aar-ci
          path: app/libs/libcore.aar
          retention-days: 1
          if-no-files-found: error
  sidecars:
    name: Native Build (Sidecars)
    runs-on: ubuntu-latest
    needs:
      - guard
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Sidecars Status
        run: |
          git ls-files -s -- \
            buildScript/lib/mieru.sh \
            buildScript/lib/masterdnsvpn.sh \
            buildScript/lib/naive.sh \
            buildScript/lib/olcrtc.sh \
            buildScript/lib/olcrtc-src/main.go \
            buildScript/lib/olcrtc-src/main_test.go \
            buildScript/lib/olcrtc-src/go.mod \
            buildScript/init/env.sh \
            buildScript/init/env_ndk.sh \
            | sha1sum > sidecars_status
      - name: Sidecars Cache
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            app/executableSo
          key: ${{ hashFiles('.github/workflows/*', 'sidecars_status') }}-${{ env.MIERU_VERSION }}-${{ env.MDVPN_COMMIT }}-${{ env.NAIVE_VERSION }}-${{ env.OLCRTC_COMMIT }}-sidecars-ci
      - name: Install Golang
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
      - name: Mieru Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib mieru
      - name: MasterDnsVPN Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib masterdnsvpn
      - name: Naive Download
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib naive
      - name: olcRTC Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./run lib olcrtc
      - name: Upload Sidecars
        uses: namespace-actions/upload-artifact@f6ccaacc655aec41b93af180d1d7eef21af862d2 # v1
        with:
          name: sidecars-so-ci
          path: app/executableSo
          retention-days: 1
          if-no-files-found: error
  build:
    name: Build OSS APK
    runs-on: ubuntu-latest
    needs:
      - libcore
      - sidecars
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Golang Status
        run: find buildScript libcore -type f -name "*.sh" | xargs cat | sha1sum > golang_status

      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status

      - name: LibCore Cache
        uses: actions/cache@v5
        with:
          path: |
            app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}-ci

      - name: Download LibCore
        uses: namespace-actions/download-artifact@5c070f7d7ebdc47682b04aa736c76e46ff5f6e1e # v1
        with:
          name: libcore-aar-ci
          path: app/libs
      - name: Download Sidecars
        uses: namespace-actions/download-artifact@5c070f7d7ebdc47682b04aa736c76e46ff5f6e1e # v1
        with:
          name: sidecars-so-ci
          path: app/executableSo
      - name: Verify Sidecar Artifacts
        run: |
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            for so in libmieru.so libmasterdnsvpn.so libnaive.so libolcrtc.so; do
              if [ ! -f "app/executableSo/$abi/$so" ]; then
                echo "Error: missing app/executableSo/$abi/$so (sidecar artifact missing)" >&2
                exit 1
              fi
            done
          done
      - name: Gradle cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.gradle
          key: gradle-oss-${{ hashFiles('**/*.gradle.kts') }}-ci

      - name: Gradle Build
        env:
          BUILD_PLUGIN: none
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/25.0.8775105" >> local.properties
          export LOCAL_PROPERTIES="${{ secrets.LOCAL_PROPERTIES }}"
          
          # 1. 核心修正：先把原作者可能殘留或影響的舊密鑰文件強制刪除
          rm -rf release.keystore
          
          # 2. 執行原作者的初始化腳本（此時沒有舊密鑰文件干擾）
          ./run init action gradle
          
          # 3. 現場生成一個密碼為 android 的全新密鑰文件，直接叫 release.keystore
          keytool -genkey -v -keystore release.keystore -storepass android -alias mykey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Build,O=Neko,C=US"
          
          # 4. 使用配對好的環境變量進行打包
          KEYSTORE_PASS="android" ALIAS_NAME="mykey" ALIAS_PASS="android" ./gradlew app:assembleOssRelease
          
          # 5. 尋找 APK 路徑並寫入環境變量
          APK=$(find app/build/outputs/apk -name '*arm64-v8a*.apk')
          APK=$(dirname $APK)
          echo "APK=$APK" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: APKs
          path: ${{ env.APK }}
