# Depot CI workflow: repository guardrails.
name: Repo Guards
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  guard:
    name: Repo Guards
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Guard - lint baseline may only shrink
        run: bash ./scripts/check-lint-baseline.sh
