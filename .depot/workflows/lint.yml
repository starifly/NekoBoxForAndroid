# Depot CI workflow: Android lint gate (enforces the strict lint config via a baseline).
#
# Lint analyzes the :app module which references libcore (app/libs/libcore.aar), so the AAR is
# built from source here (cached) just like the test workflows. The Namespace ci.yml also has
# a `lint` job that downloads the prebuilt AAR artifact.
#
# To (re)generate app/lint-baseline.xml: run this workflow once with no baseline present; the
# first lint run writes it. Fetch it from the uploaded `lint-baseline` artifact, commit it,
# then subsequent runs are green.
#
# Run ad-hoc against a branch's local tree:
#   depot ci run --org <org-id> --workflow .depot/workflows/lint.yml
name: Lint
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
permissions:
  contents: read
env:
  GO_VERSION: '1.26.4'
  NDK_VERSION: '25.0.8775105'
jobs:
  lint:
    name: Android Lint
    runs-on: depot-ubuntu-24.04-4
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install SDK platform + NDK
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;${NDK_VERSION}"
      - name: local.properties
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> local.properties

      - name: libcore status
        run: |
          # git ls-files -s emits <mode> <objecthash> <stage> <path> for every tracked
          # entry (content- and path-aware) without touching the filesystem, so it is
          # deterministic and safe even for dangling symlinks (e.g. buildScript/nkmr).
          git ls-files -s -- buildScript libcore \
            | sha256sum \
            | awk '{print $1}' > libcore_status
      - name: libcore cache
        id: libcore-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: app/libs/libcore.aar
          key: depot-libcore-${{ env.GO_VERSION }}-${{ env.NDK_VERSION }}-${{ hashFiles('libcore_status') }}
      - name: Install Go
        if: steps.libcore-cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build libcore (Go + gomobile)
        if: steps.libcore-cache.outputs.cache-hit != 'true'
        run: ./run lib core


      - name: Lint
        run: ./gradlew app:lintOssDebug

      # If lint just created the baseline (first run), surface it so it can be committed.
      - name: Upload lint baseline (if generated)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-baseline
          path: app/lint-baseline.xml
          if-no-files-found: ignore
      - name: Spotless
        run: ./gradlew spotlessCheck
