# Depot CI workflow: pure-JVM unit tests.
#
# Runs :app:testOssDebugUnitTest on a fast Depot CI sandbox. This is the JVM-test home for
# all later test-bearing plans (006/007/008/009/014/015/020/021). The Namespace ci.yml also
# has an equivalent `test` job; this Depot copy gives faster feedback per the agreed setup
# (Depot for tests, Namespace stays the APK build host).
#
# NOTE: the unit-test task still compiles the :app main source set, which references libcore
# (app/libs/libcore.aar). The tests themselves are pure-JVM (no JNI at runtime), but the
# module will not COMPILE without the AAR, so it is built here from source and cached
# (keyed on the libcore/sing-box sources) exactly like the instrumented workflow.
#
# Run ad-hoc against a branch's local tree:
#   depot ci run --workflow .depot/workflows/unit-tests.yml
name: Unit Tests
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
permissions:
  contents: read
env:
  GO_VERSION: '1.26.4'
  NDK_VERSION: '25.0.8775105'
jobs:
  unit-tests:
    name: JVM Unit Tests
    runs-on: depot-ubuntu-24.04-4
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK platform + NDK
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;${NDK_VERSION}"
      - name: local.properties
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> local.properties

      - name: libcore status
        run: |
          # git ls-files -s emits <mode> <objecthash> <stage> <path> for every tracked
          # entry (content- and path-aware) without touching the filesystem, so it is
          # deterministic and safe even for dangling symlinks (e.g. buildScript/nkmr).
          git ls-files -s -- buildScript libcore \
            | sha256sum \
            | awk '{print $1}' > libcore_status
      - name: libcore cache
        id: libcore-cache
        uses: actions/cache@v4
        with:
          path: app/libs/libcore.aar
          key: depot-libcore-${{ env.GO_VERSION }}-${{ env.NDK_VERSION }}-${{ hashFiles('libcore_status') }}
      - name: Install Go
        if: steps.libcore-cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build libcore (Go + gomobile)
        if: steps.libcore-cache.outputs.cache-hit != 'true'
        run: ./run lib core

      - name: Unit Tests
        run: ./gradlew app:testOssDebugUnitTest
